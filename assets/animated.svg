<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes scan{0%{transform:translateX(-1200px)}100%{transform:translateX(2400px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes pulseRing{0%{r:6;opacity:0.6}100%{r:28;opacity:0}}
@keyframes pulseRing2{0%{r:4;opacity:0.4}100%{r:20;opacity:0}}
@keyframes blink{0%,100%{opacity:0.7}50%{opacity:0.15}}
@keyframes blinkB{0%,100%{opacity:0.6}50%{opacity:0.1}}
@keyframes fadeFlow{0%,100%{opacity:0}30%,70%{opacity:0.5}}
@keyframes fadeFlowB{0%,100%{opacity:0}30%,70%{opacity:0.35}}
@keyframes drop{0%{transform:translateY(-60px);opacity:0}15%{opacity:0.25}85%{opacity:0.25}100%{transform:translateY(140px);opacity:0}}
.scan{animation:scan 3.5s linear infinite}
.dot-c{animation:pulse 2s ease-in-out infinite}
.ring1{animation:pulseRing 2s ease-out infinite}
.ring2{animation:pulseRing2 2s ease-out infinite 0.4s}
.brk1{animation:blink 3s ease-in-out infinite}
.brk2{animation:blinkB 3s ease-in-out infinite 0.5s}
.fc1{animation:fadeFlow 8s ease-in-out infinite}
.fc2{animation:fadeFlowB 8s ease-in-out infinite 4s}
.drop1{animation:drop 4s linear infinite}
.drop2{animation:drop 5s linear infinite 1s}
.drop3{animation:drop 4.5s linear infinite 2s}
.drop4{animation:drop 3.8s linear infinite 0.8s}
</style>
<defs>
<linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#000000"/>
<stop offset="100%" stop-color="#030a03"/>
</linearGradient>
<linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
<stop offset="20%" stop-color="#4ade80" stop-opacity="0.5"/>
<stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
<stop offset="80%" stop-color="#4ade80" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
</linearGradient>
<linearGradient id="scanG" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
<stop offset="40%" stop-color="#4ade80" stop-opacity="0.06"/>
<stop offset="50%" stop-color="#4ade80" stop-opacity="0.28"/>
<stop offset="60%" stop-color="#4ade80" stop-opacity="0.06"/>
<stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
</linearGradient>
<clipPath id="clip"><rect width="1200" height="120"/></clipPath>
</defs>
<rect width="1200" height="120" fill="url(#bg2)"/>
<g opacity="0.06" stroke="#4ade80" stroke-width="0.4">
<line x1="0" y1="30" x2="1200" y2="30"/>
<line x1="0" y1="60" x2="1200" y2="60"/>
<line x1="0" y1="90" x2="1200" y2="90"/>
<line x1="200" y1="0" x2="200" y2="120"/>
<line x1="400" y1="0" x2="400" y2="120"/>
<line x1="600" y1="0" x2="600" y2="120"/>
<line x1="800" y1="0" x2="800" y2="120"/>
<line x1="1000" y1="0" x2="1000" y2="120"/>
</g>
<rect class="scan" x="0" y="0" width="300" height="120" fill="url(#scanG)" clip-path="url(#clip)"/>
<line x1="0" y1="60" x2="1200" y2="60" stroke="url(#lg)" stroke-width="0.8"/>
<g clip-path="url(#clip)" font-family="Courier New,monospace" font-size="9" fill="#4ade80" text-anchor="middle">
<text class="drop1" x="220">1<tspan x="220" dy="11">0</tspan><tspan x="220" dy="11">1</tspan><tspan x="220" dy="11">0</tspan><tspan x="220" dy="11">1</tspan></text>
<text class="drop2" x="430">S<tspan x="430" dy="11">K</tspan><tspan x="430" dy="11">R</tspan><tspan x="430" dy="11">P</tspan><tspan x="430" dy="11">T</tspan></text>
<text class="drop3" x="780">J<tspan x="780" dy="11">A</tspan><tspan x="780" dy="11">V</tspan><tspan x="780" dy="11">A</tspan></text>
<text class="drop4" x="990">0<tspan x="990" dy="11">1</tspan><tspan x="990" dy="11">1</tspan><tspan x="990" dy="11">0</tspan><tspan x="990" dy="11">0</tspan></text>
</g>
<g class="brk1" stroke="#4ade80" stroke-width="1.5" fill="none">
<polyline points="30,40 30,18 52,18"/>
<polyline points="30,80 30,102 52,102"/>
<circle cx="30" cy="18" r="2" fill="#4ade80" stroke="none"/>
</g>
<g class="brk2" stroke="#4ade80" stroke-width="1.5" fill="none">
<polyline points="1170,40 1170,18 1148,18"/>
<polyline points="1170,80 1170,102 1148,102"/>
<circle cx="1170" cy="18" r="2" fill="#4ade80" stroke="none"/>
</g>
<circle class="dot-c" cx="600" cy="60" r="3.5" fill="#4ade80"/>
<circle class="ring1" cx="600" cy="60" r="6" fill="none" stroke="#4ade80" stroke-width="0.8"/>
<circle class="ring2" cx="600" cy="60" r="4" fill="none" stroke="#4ade80" stroke-width="0.5"/>
<g class="fc1" font-family="Courier New,monospace" font-size="9.5" fill="#4ade80">
<text x="100" y="56">on join:</text>
<text x="100" y="69" fill="#4b7c4b">  send "Welcome"</text>
</g>
<g class="fc2" font-family="Courier New,monospace" font-size="9.5" fill="#4ade80">
<text x="920" y="56">skript 2.13.2</text>
<text x="920" y="69" fill="#4b7c4b">  // no limits</text>
</g>
</svg>
