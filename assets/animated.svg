<svg width="1200" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="40%" stop-color="#4ade80" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#4ade80" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="80%" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeUp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="svgClip">
      <rect width="1200" height="160"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="160" fill="#000000"/>
  <rect width="1200" height="160" fill="url(#fadeUp)"/>

  <!-- Grid -->
  <g opacity="0.07" stroke="#4ade80" stroke-width="0.4">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="150" y1="0" x2="150" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/>
    <line x1="450" y1="0" x2="450" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="750" y1="0" x2="750" y2="160"/>
    <line x1="900" y1="0" x2="900" y2="160"/>
    <line x1="1050" y1="0" x2="1050" y2="160"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="1200" height="160" fill="url(#scanGrad)" clip-path="url(#svgClip)">
    <animateTransform attributeName="transform" type="translate" from="-1200 0" to="1200 0" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Horizontal pulse line -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="url(#lineH)" stroke-width="1">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Corner brackets - top left -->
  <g filter="url(#glow)">
    <polyline points="30,55 30,30 55,30" fill="none" stroke="#4ade80" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="30" cy="30" r="2" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner brackets - top right -->
  <g filter="url(#glow)">
    <polyline points="1170,55 1170,30 1145,30" fill="none" stroke="#4ade80" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="1170" cy="30" r="2" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.2;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner brackets - bottom left -->
  <g filter="url(#glow)">
    <polyline points="30,105 30,130 55,130" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="3s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Corner brackets - bottom right -->
  <g filter="url(#glow)">
    <polyline points="1170,105 1170,130 1145,130" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Floating code snippets left -->
  <text x="80" y="72" font-family="'Courier New',monospace" font-size="10" fill="#4ade80" opacity="0">
    on join:
    <animate attributeName="opacity" values="0;0.35;0.35;0" dur="8s" begin="0s" repeatCount="indefinite"/>
  </text>
  <text x="80" y="86" font-family="'Courier New',monospace" font-size="10" fill="#4b7c4b" opacity="0">
    &nbsp;&nbsp;send "Welcome"
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="8s" begin="0.3s" repeatCount="indefinite"/>
  </text>

  <!-- Floating code snippets right -->
  <text x="950" y="72" font-family="'Courier New',monospace" font-size="10" fill="#4ade80" opacity="0">
    plugin.yml
    <animate attributeName="opacity" values="0;0.35;0.35;0" dur="8s" begin="4s" repeatCount="indefinite"/>
  </text>
  <text x="950" y="86" font-family="'Courier New',monospace" font-size="10" fill="#4b7c4b" opacity="0">
    version: 2.13.2
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="8s" begin="4.3s" repeatCount="indefinite"/>
  </text>

  <!-- Center pulsing dot cluster -->
  <g filter="url(#glow2)">
    <circle cx="600" cy="80" r="3.5" fill="#4ade80">
      <animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="80" r="10" fill="none" stroke="#4ade80" stroke-width="0.8">
      <animate attributeName="r" values="8;18;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="80" r="20" fill="none" stroke="#4ade80" stroke-width="0.4">
      <animate attributeName="r" values="16;30;16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0;0.25" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Side dots animated -->
  <circle cx="200" cy="80" r="1.5" fill="#4ade80">
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="80" r="1" fill="#4ade80">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="80" r="1.5" fill="#4ade80">
    <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="80" r="1.5" fill="#4ade80">
    <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="80" r="1" fill="#4ade80">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="80" r="1.5" fill="#4ade80">
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Vertical data streams -->
  <g font-family="'Courier New',monospace" font-size="9" fill="#4ade80" text-anchor="middle" clip-path="url(#svgClip)">
    <text x="250" y="0" opacity="0.2">
      1<tspan dy="12" x="250">0</tspan><tspan dy="12" x="250">1</tspan><tspan dy="12" x="250">1</tspan><tspan dy="12" x="250">0</tspan>
      <animateTransform attributeName="transform" type="translate" from="0 -60" to="0 170" dur="4s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="0" opacity="0.15">
      S<tspan dy="12" x="450">K</tspan><tspan dy="12" x="450">R</tspan><tspan dy="12" x="450">P</tspan><tspan dy="12" x="450">T</tspan>
      <animateTransform attributeName="transform" type="translate" from="0 -60" to="0 170" dur="5s" begin="1s" repeatCount="indefinite"/>
    </text>
    <text x="760" y="0" opacity="0.15">
      J<tspan dy="12" x="760">A</tspan><tspan dy="12" x="760">V</tspan><tspan dy="12" x="760">A</tspan><tspan dy="12" x="760">!</tspan>
      <animateTransform attributeName="transform" type="translate" from="0 -60" to="0 170" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="960" y="0" opacity="0.2">
      0<tspan dy="12" x="960">1</tspan><tspan dy="12" x="960">0</tspan><tspan dy="12" x="960">0</tspan><tspan dy="12" x="960">1</tspan>
      <animateTransform attributeName="transform" type="translate" from="0 -60" to="0 170" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
    </text>
  </g>

</svg>
