  <line x1="100" y1="162" x2="1100" y2="162" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <text x="600" y="188" font-family="'Courier New','monospace'" font-size="12.5"
    fill="#4b7c4b" text-anchor="middle" letter-spacing="3">
    SKRIPT DEVELOPER  ·  JAVA DEVELOPER  ·  DISCORD BOT DEVELOPER  ·  WEB &amp; SOFTWARE
  </text>

  <text x="600" y="218" font-family="'Courier New','monospace'" font-size="11"
    fill="#2d5c2d" text-anchor="middle" letter-spacing="2">
    MelonCity Developer  ·  since 29.10.2025
  </text>

  <circle cx="300" cy="240" r="1.5" fill="#4ade80" opacity="0.12"/>
  <circle cx="450" cy="252" r="1" fill="#4ade80" opacity="0.09"/>
  <circle cx="600" cy="258" r="2" fill="#4ade80" opacity="0.07"/>
  <circle cx="750" cy="250" r="1" fill="#4ade80" opacity="0.09"/>
  <circle cx="900" cy="244" r="1.5" fill="#4ade80" opacity="0.12"/>
  <line x1="0" y1="248" x2="1200" y2="248" stroke="#4ade80" stroke-width="0.3" stroke-opacity="0.04"/>

  <rect width="1200" height="60" y="220" fill="url(#fadeBottom)"/>
