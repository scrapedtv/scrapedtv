<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="35%" stop-color="#060f06"/>
      <stop offset="70%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6effa0"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4ade80" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="80%" stop-color="#4ade80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <line x1="0" y1="40" x2="1200" y2="40" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.08"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.08"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.08"/>
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.06"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.04"/>

  <line x1="200" y1="0" x2="200" y2="280" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="280" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="280" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.05"/>
  <line x1="800" y1="0" x2="800" y2="280" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.05"/>
  <line x1="1000" y1="0" x2="1000" y2="280" stroke="#4ade80" stroke-width="0.2" stroke-opacity="0.05"/>

  <polyline points="20,60 20,20 60,20" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.5"/>
  <polyline points="1180,60 1180,20 1140,20" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.5"/>
  <polyline points="20,220 20,260 60,260" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.2"/>
  <polyline points="1180,220 1180,260 1140,260" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.2"/>

  <circle cx="20" cy="20" r="2.5" fill="#4ade80" opacity="0.5"/>
  <circle cx="1180" cy="20" r="2.5" fill="#4ade80" opacity="0.5"/>
  <circle cx="20" cy="260" r="2.5" fill="#4ade80" opacity="0.2"/>
  <circle cx="1180" cy="260" r="2.5" fill="#4ade80" opacity="0.2"/>

  <circle cx="100" cy="50" r="1.5" fill="#4ade80" opacity="0.3"/>
  <circle cx="320" cy="30" r="1" fill="#4ade80" opacity="0.25"/>
  <circle cx="880" cy="45" r="1.5" fill="#4ade80" opacity="0.3"/>
  <circle cx="1100" cy="35" r="1" fill="#4ade80" opacity="0.25"/>
  <circle cx="150" cy="190" r="1" fill="#4ade80" opacity="0.15"/>
  <circle cx="1050" cy="185" r="1" fill="#4ade80" opacity="0.15"/>

  <text x="602" y="145" font-family="'Arial Black','Impact',sans-serif" font-size="96" font-weight="900"
    fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.08"
    text-anchor="middle" letter-spacing="8">SCRAPEDTV</text>

  <text x="600" y="143" font-family="'Arial Black','Impact',sans-serif" font-size="96" font-weight="900"
    fill="url(#textGlow)" text-anchor="middle" letter-spacing="8"
